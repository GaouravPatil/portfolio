            font-family: var(--font);

            width: 100vw;
            height: 100vh;
            background: var(--bg);

            flex-shrink: 0;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-red {
            background: #ff5f57;
        }

        .dot-yellow {
            background: #febc2e;
        }

        .dot-green {
            background: #28c840;
        }

        #url-pill {

            max-width: 380px;
            margin: 0 auto;
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        #url-pill .lock {
            color: var(--green);
            font-size: 11px;
        }

        #url-pill .domain {
            color: var(--bright);
            letter-spacing: 0.03em;

        #clock {

            color: var(--blue);
            white-space: nowrap;
            margin-left: auto;

            height: 32px;
            display: flex;
            align-items: flex-end;
            gap: 4px;

            border: 1px solid transparent;
            border-bottom: none;
            color: var(--muted);
            background: transparent;
            font-family: var(--font);
            font-size: 11px;
            cursor: default;
        }

        .tab.active {
            background: var(--bg);
            border-color: var(--border);
            color: var(--bright);
        }

        #terminal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 28px 16px;
            scroll-behavior: smooth;
            cursor: text;
        }

        #terminal-body::-webkit-scrollbar {
            width: 6px;
        }

        #terminal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        #terminal-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;

        .line {

            line-height: 1.75;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text);

        .line.muted {

        .line.bold {
            color: var(--bright);
            font-weight: 500;

        .line.success {
            color: var(--green);

            color: var(--yellow);
        }

        .line.error {

            color: var(--purple);
        }

        .line.sec {
            color: var(--green);
            font-weight: 500;
            margin: 6px 0 2px;

        .tag {
            display: inline-block;
            background: #1c2128;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 8px;
            font-size: 11px;

            color: var(--purple);
        }

            border-color: #b45309;
            color: var(--orange);
        }

        .typing-cursor::after {

            color: var(--blue);

        /* ── Instant renderer ────────────────────────────────── */
        function renderInstant(item) {
            if (item.t === 'empty') {
                const d = document.createElement('div');
                d.className = 'line'; d.innerHTML = '&nbsp;';
                out.appendChild(d); return;
            }
            if (item.t === 'sec') {
                const d = document.createElement('div');
                d.className = 'line sec';
                d.textContent = `  ── ${item.v} ──`;
                out.appendChild(d); return;
            }
            if (item.t === 'tags') {
                const d = document.createElement('div');
                d.className = 'line'; d.style.paddingLeft = '16px';
                const cls = item.color || '';
                d.innerHTML = item.v.map(t => `<span class="tag ${cls}">${t}</span>`).join('');
                out.appendChild(d); return;
            }
            if (item.t === 'raw') {
                const d = document.createElement('div');
                d.className = 'line'; d.innerHTML = item.v;
                out.appendChild(d); return;
            }
            if (item.t === 'resumelink') {
                out.appendChild(makeResumeLinkEl()); return;
            }
            const d = document.createElement('div');
            d.className = `line ${item.c || ''}`;
            d.textContent = item.v || '';
            out.appendChild(d);
        }

            return new Promise(async resolve => {

                if (item.t === 'empty') {
                    const d = document.createElement('div');
                    d.className = 'line'; d.innerHTML = '&nbsp;';
                    out.appendChild(d); scrollToBottom(); return resolve();
                }

                if (item.t === 'raw') {
                    const d = document.createElement('div');
                    d.className = 'line'; d.innerHTML = item.v;
                    out.appendChild(d); scrollToBottom(); return resolve();
                }

                if (item.t === 'resumelink') {
                    out.appendChild(makeResumeLinkEl());
                    scrollToBottom(); return resolve();
                }

                if (item.t === 'sec') {
                    const text = `  ── ${item.v} ──`;
                    const d = document.createElement('div');
                    d.className = 'line sec typing-cursor';
                    out.appendChild(d);
                    await typeChars(d, text);
                    d.classList.remove('typing-cursor');
                    scrollToBottom(); return resolve();
                }

                if (item.t === 'tags') {
                    const d = document.createElement('div');
                    d.className = 'line'; d.style.paddingLeft = '16px';
                    out.appendChild(d);
                    const cls = item.color || '';
                    for (const tagText of item.v) {
                        const span = document.createElement('span');
                        span.className = `tag ${cls}`;
                        span.textContent = tagText;
                        d.appendChild(span);
                        scrollToBottom();
                        await delay(TAG_DELAY);
                    }
                    return resolve();
                }

                const d = document.createElement('div');
                d.className = `line ${item.c || ''} typing-cursor`;
                out.appendChild(d);
                await typeChars(d, item.v || '');
                d.classList.remove('typing-cursor');
                scrollToBottom();
                resolve();
            });
        }

        function typeChars(el, text) {
            return new Promise(resolve => {
                let i = 0;
                function next() {
                    if (i >= text.length) return resolve();
                    el.textContent += text[i++];
                    scrollToBottom();
                    setTimeout(next, CHAR_DELAY);
                }
                next();
            });
        }

        async function animateItems(items) {
            for (const item of items) {
                await typewriterItem(item);
                await delay(LINE_DELAY);
            }
        }

        function printPrompt(cmd) {
            const d = document.createElement('div');
            d.className = 'line';
            d.innerHTML = `<span style="color:#58a6ff;">visitor@gaourav.dev:~$</span> <span style="color:#c9d1d9;">${cmd}</span>`;
            out.appendChild(d);
        }

        /* ── Run ─────────────────────────────────────────────── */
        async function run(cmd, instant = false) {
            cmd = cmd.trim();
            if (!cmd || isTyping) return;

            const key = cmd.toLowerCase();
            if (!instant) printPrompt(cmd);
            statusCmd.textContent = key;

            if (key === 'clear') { out.innerHTML = ''; scrollToBottom(); return; }

            const fn = commands[key];
            if (!fn) {
                isTyping = true; inp.disabled = true;
                const d = document.createElement('div');
                d.className = 'line error typing-cursor';
                out.appendChild(d);
                await typeChars(d, `  bash: command not found: ${cmd}. Try 'help'.`);
                d.classList.remove('typing-cursor');
                inp.disabled = false; inp.focus(); isTyping = false;
                scrollToBottom(); return;
            }

            const items = fn();
            if (!items) return;

            if (instant) {
                items.forEach(renderInstant);
                scrollToBottom();
            } else {
                isTyping = true; inp.disabled = true;
                await animateItems(items);
                inp.disabled = false; inp.focus(); isTyping = false;
                scrollToBottom();
            }
        }

        /* ── Input ───────────────────────────────────────────── */
        inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (isTyping) return;
                const val = inp.value.trim();
                if (val) { cmdHistory.unshift(val); histIdx = -1; }
                inp.value = ''; run(val);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (histIdx < cmdHistory.length - 1) { histIdx++; inp.value = cmdHistory[histIdx]; }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (histIdx > 0) { histIdx--; inp.value = cmdHistory[histIdx]; }
                else { histIdx = -1; inp.value = ''; }
            }
        });

        termBody.addEventListener('click', () => { if (!isTyping) inp.focus(); });

        /* ── Clock ───────────────────────────────────────────── */
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toTimeString().slice(0, 8);
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ── Boot ────────────────────────────────────────────── */
        run('banner', true);
        scrollToBottom();
        inp.focus();
    </script>
</body>

</html>
